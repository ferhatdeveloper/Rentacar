name: rentacar
description: Rent a Car SaaS — Flutter + PostgreSQL + PostgREST + Riverpod
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  supabase_flutter: ^2.9.0
  flutter_animate: ^4.5.2
  equatable: ^2.0.7
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
